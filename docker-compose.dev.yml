services:
  redis:
    image: redis:alpine
    container_name: codraw_redis_dev
    ports:
      - "6379:6379"
    restart: always

  backend:
    image: node:20-alpine
    container_name: codraw_backend_dev
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "4000:4000"
    command: sh -c "npm install && npm run dev"
    environment:
      - PORT=4000
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - redis
    restart: always

  frontend:
    image: node:20-alpine
    container_name: codraw_frontend_dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_SOCKET_URL=http://localhost:4000
    depends_on:
      - backend
    restart: always
