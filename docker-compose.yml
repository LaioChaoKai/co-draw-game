services:
  redis:
    image: redis:alpine
    container_name: codraw_redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codraw_backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - redis
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codraw_frontend
    ports:
      - "80:80"
    environment:
      - VITE_SOCKET_URL=http://localhost:4000
    depends_on:
      - backend
    restart: always
